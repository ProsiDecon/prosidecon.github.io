---
layout: default
---
<section class="page-hero">
  <div class="container">
    <p class="page-hero__eyebrow">{{ site.data.site.name }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
      <p class="page-hero__intro">{{ page.intro }}</p>
    {% endif %}
  </div>
</section>

<section class="container page-section{% if page.section_class %} {{ page.section_class }}{% endif %}">
  {{ content }}
</section>
